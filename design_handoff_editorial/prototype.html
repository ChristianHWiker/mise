<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recipe Calculator · Editorial prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: #f0eee9;
    font-family: 'Geist', system-ui, -apple-system, sans-serif;
    color: #1f1a14;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px; box-sizing: border-box;
  }
  #root { display: flex; align-items: center; justify-content: center; }
  body[data-dark="true"] { background: #0a0a0a; color: #f1ead8; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data + math -->
<script src="data.js"></script>

<!-- Shells -->
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Editorial UI -->
<script type="text/babel" src="editorial.jsx"></script>

<!-- Entry -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "fractionStyle": "inline-slash",
  "unitSystem": "us"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.body.dataset.dark = String(t.dark);
  }, [t.dark]);

  return (
    <React.Fragment>
      <EditorialApp tweaks={t} startScreen="home" />

      <TweaksPanel>
        <TweakSection label="Display" />
        <TweakToggle
          label="Dark mode"
          value={t.dark}
          onChange={(v) => setTweak('dark', v)}
        />
        <TweakRadio
          label="Fractions"
          value={t.fractionStyle}
          options={[
            { value: 'inline-slash', label: '1 1/2' },
            { value: 'stacked',      label: '1½' },
            { value: 'decimal',      label: '1.5' },
          ]}
          onChange={(v) => setTweak('fractionStyle', v)}
        />
        <TweakRadio
          label="Units"
          value={t.unitSystem}
          options={[
            { value: 'us',     label: 'US' },
            { value: 'metric', label: 'Metric' },
          ]}
          onChange={(v) => setTweak('unitSystem', v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
